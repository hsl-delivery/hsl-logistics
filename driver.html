<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B1F33">
<title>HSL ใบงานจัดส่ง</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0B1F33;--navy2:#152C44;--gold:#C8962A;--gold2:#E8B84B;
  --teal:#0F6E56;--teal2:#E1F5EE;--red:#A32D2D;--red2:#FCEBEB;
  --amb:#854F0B;--amb2:#FAEEDA;--blu:#0C447C;--blu2:#E6F1FB;
  --grn:#27500A;--grn2:#EAF3DE;--pur:#3C3489;--pur2:#EEEDFE;
  --surf:#F0F2F5;--wht:#fff;--bdr:#E2E6EC;
  --txt:#0B1525;--txt2:#3A4E63;--txt3:#6B7E92;
}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--surf);color:var(--txt);min-height:100vh;padding-bottom:40px;}

/* ── HEADER ── */
.hdr{background:var(--navy);padding:14px 14px 0;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-size:13px;font-weight:700;color:var(--gold2);}
.logo span{display:block;font-size:10px;color:rgba(255,255,255,.35);font-weight:400;}
.date-pill{font-size:11px;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}
.sel-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.sel-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.sel-row{display:flex;align-items:center;gap:8px;}
.sel-row select{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 10px;font-size:13px;color:#fff;font-family:inherit;outline:none;}
.sel-row select option{background:var(--navy2);}
.sel-row button{padding:7px 14px;background:var(--gold);border:none;border-radius:8px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;}
.drv-card{background:linear-gradient(135deg,var(--navy2),#1D3A5C);border:1px solid rgba(200,150,42,.25);border-radius:12px;padding:12px 14px;}
.dc-plate{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:#fff;}
.dc-name{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}
.dc-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dc-stats{display:flex;gap:12px;align-items:center;}
.dcs{text-align:center;}
.dcs-n{font-size:18px;font-weight:700;color:#fff;font-family:'IBM Plex Mono',monospace;line-height:1;}
.dcs-l{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;}
.exit-box{background:var(--gold);border-radius:8px;padding:5px 11px;text-align:center;}
.exit-t{font-size:16px;font-weight:700;color:#fff;font-family:'IBM Plex Mono',monospace;line-height:1;}
.exit-l{font-size:9px;color:rgba(255,255,255,.75);margin-top:2px;}

/* ── PROGRESS STEPPER ── */
.stepper{background:var(--navy);padding:0 14px;display:flex;align-items:center;gap:0;overflow-x:auto;border-top:1px solid rgba(255,255,255,.06);}
.stepper::-webkit-scrollbar{display:none;}
.step{display:flex;align-items:center;gap:5px;flex-shrink:0;padding:9px 0;}
.step-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.sd-done{background:var(--teal);color:#fff;}
.sd-active{background:var(--gold);color:#fff;}
.sd-todo{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);}
.step-lbl{font-size:10px;font-weight:500;white-space:nowrap;}
.sl-done{color:var(--teal2);}
.sl-active{color:var(--gold2);}
.sl-todo{color:rgba(255,255,255,.35);}
.step-line{width:14px;height:1px;background:rgba(255,255,255,.15);flex-shrink:0;margin:0 2px;}

/* ── CONTENT ── */
.content{padding:12px 12px;}

/* ── PHASE CARD ── */
.phase-card{background:var(--wht);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.pc-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.pc-title{font-size:13px;font-weight:700;flex:1;}
.pc-sub{font-size:10px;margin-top:2px;}
.pc-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;}
.pb-pending{background:var(--surf);color:var(--txt3);border:1px solid var(--bdr);}
.pb-done{background:var(--grn2);color:var(--grn);}
.pb-active{background:var(--amb2);color:var(--amb);}
.pc-body{padding:12px 14px;border-top:1px solid var(--bdr);}

/* ── STEP INDICATOR ── */
.step-indicator{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--surf);border-bottom:1px solid var(--bdr);}
.si-num{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--navy);color:var(--gold2);}
.si-text{font-size:11px;color:var(--txt2);}

/* GMP */
.gmp-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);}
.gmp-item:last-child{border-bottom:none;}
.gmp-label{flex:1;font-size:13px;font-weight:500;}
.gmp-sublabel{font-size:10px;color:var(--txt3);margin-top:1px;}
.gmp-toggle{display:flex;gap:5px;}
.tog-ok{padding:6px 14px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--wht);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--txt3);transition:all .15s;}
.tog-ok.on{background:var(--teal);border-color:var(--teal);color:#fff;}
.tog-nok{padding:6px 10px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--wht);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--txt3);transition:all .15s;}
.tog-nok.on{background:var(--red);border-color:var(--red);color:#fff;}

/* Wait Bill */
.wait-row{display:flex;align-items:center;gap:10px;padding:10px 0;}
.wait-lbl{flex:1;font-size:13px;font-weight:500;}
.wait-ctrl{display:flex;align-items:center;gap:8px;}
.wc-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--bdr);background:var(--surf);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--txt);}
.wc-btn:active{background:var(--bdr);}
.wc-val{min-width:52px;text-align:center;font-size:18px;font-weight:700;font-family:monospace;color:var(--navy);}
.wc-unit{font-size:12px;color:var(--txt3);}

/* Drop card */
.drop-header{padding:12px 14px;border-bottom:1px solid var(--bdr);}
.drop-badges{display:flex;gap:6px;margin-bottom:4px;}
.drop-num-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--navy);color:var(--gold2);}
.round-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;}
.rb-1{background:var(--grn2);color:var(--grn);}
.rb-2{background:var(--pur2);color:var(--pur);}
.drop-nick{font-size:20px;font-weight:700;color:var(--navy);margin-top:3px;}
.drop-company{font-size:11px;color:var(--txt3);margin-top:1px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--bdr);}
.ig-cell{padding:8px 14px;border-right:1px solid var(--bdr);}
.ig-cell:nth-child(even){border-right:none;}
.ig-l{font-size:10px;color:var(--txt3);}
.ig-v{font-size:13px;font-weight:600;margin-top:2px;}
.po-row{padding:8px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.po-chip{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;background:var(--amb2);color:var(--amb);}
.cond-row{padding:8px 14px;border-bottom:1px solid var(--bdr);background:#FFFBF5;}
.cond-l{font-size:10px;font-weight:600;color:var(--amb);margin-bottom:2px;}
.cond-t{font-size:11px;color:var(--txt2);line-height:1.5;}

/* Time tracking per drop */
.time-track{padding:12px 14px;border-bottom:1px solid var(--bdr);}
.tt-title{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px;}
.tt-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdr);}
.tt-row:last-child{border-bottom:none;}
.tt-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
.tt-label{flex:1;font-size:12px;font-weight:500;}
.tt-time-inp{padding:6px 10px;border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-family:inherit;outline:none;color:var(--txt);}
.tt-time-inp:focus{border-color:var(--navy);}
.tt-wait-ctrl{display:flex;align-items:center;gap:6px;}
.twc-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--bdr);background:var(--surf);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.twc-val{min-width:36px;text-align:center;font-size:13px;font-weight:600;font-family:monospace;}
.twc-unit{font-size:10px;color:var(--txt3);}

/* IFOT */
.ifot-section{padding:12px 14px;border-bottom:1px solid var(--bdr);}
.ifot-title{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.chk-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);cursor:pointer;}
.chk-item:last-child{border-bottom:none;}
.chk-box{width:24px;height:24px;border-radius:7px;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;flex-shrink:0;transition:all .15s;}
.chk-box.on{background:var(--teal);border-color:var(--teal);color:#fff;}
.chk-lbl{flex:1;font-size:13px;font-weight:500;}
.sat-row{display:flex;gap:4px;margin-top:8px;}
.sat-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 3px;border-radius:10px;border:1.5px solid var(--bdr);cursor:pointer;transition:all .15s;}
.sat-btn.on{border-color:var(--gold);background:var(--gold);}
.sat-btn.on .sat-lbl{color:#fff;}
.sat-ico{font-size:18px;}
.sat-lbl{font-size:9px;font-weight:600;color:var(--txt3);text-align:center;line-height:1.3;}
.note-inp{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-family:inherit;outline:none;resize:none;min-height:52px;}

/* Action buttons */
.act-section{padding:10px 14px;display:flex;flex-direction:column;gap:7px;}
.act-btn{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:11px;border:1px solid var(--bdr);background:var(--wht);text-decoration:none;cursor:pointer;transition:all .12s;color:inherit;width:100%;text-align:left;}
.act-btn:active{transform:scale(.98);background:var(--surf);}
.ab-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.ai-green{background:var(--teal2);}
.ai-blue{background:var(--blu2);}
.ab-body{flex:1;min-width:0;}
.ab-title{font-size:13px;font-weight:600;color:var(--navy);}
.ab-sub{font-size:10px;color:var(--txt3);margin-top:1px;}
.ab-qr{flex-shrink:0;width:40px;height:40px;border-radius:6px;overflow:hidden;border:1px solid var(--bdr);}
.ab-qr canvas,.ab-qr img{width:40px!important;height:40px!important;}
.ab-arr{font-size:15px;color:var(--txt3);}

/* Confirm button */
.confirm-btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;margin-top:4px;}
.confirm-btn:active{transform:scale(.98);}
.confirm-btn:disabled{background:#aaa!important;cursor:not-allowed;}
.btn-teal{background:var(--teal);}
.btn-navy{background:var(--navy);}
.btn-gold{background:var(--gold);}
.btn-red{background:var(--red);}
.btn-pur{background:var(--pur);}

/* Summary card */
.summary-card{background:var(--navy);border-radius:14px;padding:16px;margin-bottom:10px;}
.sc-title{font-size:12px;font-weight:600;color:var(--gold2);margin-bottom:12px;}
.sc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.sc-item{text-align:center;}
.sc-val{font-size:20px;font-weight:700;color:#fff;font-family:'IBM Plex Mono',monospace;line-height:1;}
.sc-lbl{font-size:9px;color:rgba(255,255,255,.45);margin-top:3px;}
.sc-row{display:flex;flex-direction:column;gap:5px;margin-top:12px;}
.sc-r-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;}
.sc-r-key{color:rgba(255,255,255,.5);}
.sc-r-val{color:#fff;font-family:monospace;font-weight:600;}

/* Fill Rate (ท้ายสุด) */
.fill-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.fill-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 5px;border-radius:11px;border:1.5px solid var(--bdr);cursor:pointer;transition:all .15s;background:var(--wht);}
.fill-btn.on{border-color:var(--teal);background:var(--teal2);}
.fill-btn.on .fill-lbl{color:var(--teal);}
.fill-circle{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.fill-lbl{font-size:11px;font-weight:600;color:var(--txt3);text-align:center;}
.fill-sublbl{font-size:9px;color:var(--txt3);}

/* Truck tab */
.tabs{background:var(--navy);display:flex;padding:0 14px;border-top:1px solid rgba(255,255,255,.06);}
.tab{flex:1;padding:9px 0;font-size:11px;font-weight:500;color:rgba(255,255,255,.4);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold);}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:12px;font-size:12px;font-weight:500;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;border-left:3px solid var(--gold);pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.copy-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--txt3);padding:2px 4px;}

/* ── REV.02 ADDITIONS ── */
.fill-section{padding:10px 0 0;}
.fill-title{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:8px;}
.fill-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.fill-opt{border:2px solid var(--bdr);border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;background:var(--wht);transition:all .15s;}
.fill-opt.on{border-color:var(--gold);background:var(--amb2);}
.fill-opt .fo-pct{font-size:18px;font-weight:700;color:var(--txt);font-family:'IBM Plex Mono',monospace;}
.fill-opt .fo-lbl{font-size:10px;color:var(--txt3);margin-top:2px;}
.fill-opt.on .fo-pct{color:var(--amb);}
.fill-over{border:2px solid var(--bdr);border-radius:12px;padding:10px;text-align:center;cursor:pointer;background:var(--wht);margin-bottom:8px;}
.fill-over.on{border-color:var(--red);background:var(--red2);}
.fill-over .fo-pct{font-size:15px;font-weight:700;color:var(--red);}
.chk-wall{background:var(--red2);border:1.5px solid var(--red);border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.chk-wall-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px;}
.chk-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid rgba(163,45,45,.15);}
.chk-item:last-child{border-bottom:none;}
.chk-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--red);background:var(--wht);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:1px;transition:all .15s;}
.chk-box.checked{background:var(--red);color:#fff;}
.chk-lbl{font-size:13px;color:var(--txt);line-height:1.4;}
.chk-sub{font-size:11px;color:var(--txt3);margin-top:1px;}
.pallet-qty{display:flex;align-items:center;gap:8px;margin-top:4px;}
.pallet-qty input{width:56px;border:1.5px solid var(--bdr);border-radius:8px;padding:4px 8px;font-size:13px;text-align:center;font-family:inherit;}
.photo-zone{border:1.5px dashed var(--bdr);border-radius:10px;padding:14px;text-align:center;cursor:pointer;margin-top:8px;background:var(--surf);}
.photo-zone p{font-size:12px;color:var(--txt3);margin-top:5px;}
.svc-time-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;background:var(--blu2);color:var(--blu);margin-top:4px;}
.btn-red{background:var(--red)!important;}
.btn-red:disabled{background:var(--bdr)!important;color:var(--txt3)!important;cursor:not-allowed;}


/* ── POST-CHECKLIST YES/NO ── */
.chk-yn-row{display:flex;align-items:center;gap:0;padding:9px 0;border-bottom:1px solid rgba(163,45,45,.15);}
.chk-yn-row:last-of-type{border-bottom:none;}
.chk-yn-labels{flex:1;padding-right:8px;}
.chk-yn-lbl{font-size:13px;color:var(--txt);font-weight:500;}
.chk-yn-sub{font-size:11px;color:var(--txt3);margin-top:1px;}
.yn-pair{display:flex;gap:6px;flex-shrink:0;}
.yn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:9px;border:1.5px solid var(--bdr);background:var(--wht);cursor:pointer;min-width:48px;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.yn-btn:active{transform:scale(.94);}
.yn-btn .yn-ico{font-size:16px;line-height:1;}
.yn-btn .yn-txt{font-size:9px;font-weight:600;color:var(--txt3);}
.yn-btn.yes-on{border-color:var(--grn);background:var(--grn2);}
.yn-btn.yes-on .yn-txt{color:var(--grn);}
.yn-btn.no-on{border-color:#854F0B;background:var(--amb2);}
.yn-btn.no-on .yn-txt{color:#854F0B;}

</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">HSL Cartons<span>ใบงานจัดส่ง + Time Tracking</span></div>
    <div class="date-pill" id="dateLabel">—</div>
  </div>
  <div class="sel-box">
    <div class="sel-label">เลือกคนขับ / ทะเบียนรถ</div>
    <div class="sel-row">
      <select id="driverSel"><option value="">-- เลือกคนขับ --</option></select>
      <button onclick="loadDriver()">โหลด ▶</button>
    </div>
  </div>
  <div id="driverCard" style="display:none;">
    <div class="drv-card">
      <div class="dc-row">
        <div>
          <div class="dc-plate" id="dcPlate">—</div>
          <div class="dc-name" id="dcName">—</div>
        </div>
        <div class="dc-stats">
          <div class="dcs"><div class="dcs-n" id="dcDrops">0</div><div class="dcs-l">จุด</div></div>
          <div class="dcs"><div class="dcs-n" id="dcQty">0</div><div class="dcs-l">ชิ้น</div></div>
          <div class="exit-box"><div class="exit-t">08:00</div><div class="exit-l">ออก</div></div>
        </div>
      </div>
    </div>
    <!-- Stepper -->
    <div class="stepper" id="stepper"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('trip',this)">🚛 Trip Flow</div>
      <div class="tab" onclick="switchTab('truck',this)">📋 ข้อมูลรถ</div>

function updateStepper() {
  if (!curDrv) return;
  const ph = tripState.phase;
  const steps = [
    {id:"gmp",label:"Check"},{id:"loading",label:"โหลด"},
    {id:"bill",label:"Bill"},{id:"dispatched",label:"Dispatch"},
    ...curDrv.drops.map((_,i) => ({id:"drop_"+i, label:"จุด"+(i+1)})),
    {id:"return",label:"กลับ"}
  ];
  const order = steps.map(s => s.id);
  const curIdx = order.indexOf(ph);
  document.getElementById("stepper").innerHTML = steps.map((s,i) => {
    const done = i < curIdx, active = i === curIdx;
    const dc = done?"sd-done":active?"sd-active":"sd-pending";
    const lc = done?"sl-done":active?"sl-active":"";
    return `<div class="step"><div class="step-dot ${dc}">${done?"✓":i+1}</div><span class="step-lbl ${lc}">${s.label}</span></div>${i<steps.length-1?'<div class="step-line"></div>':""}`;
  }).join("");
}

              <span class="yn-ico">✅</span><span class="yn-txt">มี</span>
            </div>
            <div class="yn-btn${pc[k]===false?" no-on":""}" onclick="setPostChk(${i},'${k}',false)">
              <span class="yn-ico">❌</span><span class="yn-txt">ไม่มี</span>
            </div>
          </div>
        </div>`).join("")}
        <div class="chk-item">
          <div style="flex:1;">
            <div class="chk-lbl">รับพาเลทกลับ</div>
            <div class="pallet-qty">
              <span style="font-size:12px;color:var(--txt3);">จำนวน:</span>
              <input type="number" min="0" value="${pc.palletQty}" oninput="tripState.drops[${i}].postChk.palletQty=parseInt(this.value)||0" style="width:60px;border:1.5px solid var(--bdr);border-radius:8px;padding:4px 8px;font-size:13px;text-align:center;font-family:inherit;">
              <span style="font-size:12px;color:var(--txt3);">แผ่น</span>
            </div>
          </div>
        </div>
      </div>
      <div class="photo-zone" onclick="toast('📷 ฟีเจอร์ถ่ายรูป OCR จะเปิดใช้เมื่อ GPS พร้อม')">
        <div style="font-size:28px;">📷</div>
        <p>ถ่ายรูปเอกสารพาเลท (ถ้ามี)<br><span style="font-size:10px;">OCR อัตโนมัติ → แจ้ง Admin</span></p>
      </div>
      <textarea class="note-inp" placeholder="Note พิเศษ..." oninput="tripState.drops[${i}].postChk.extraNote=this.value" style="margin-top:8px;">${pc.extraNote}</textarea>
      <button class="confirm-btn btn-red" onclick="confirmPostChk(${i})" style="margin-top:10px;" ${allDone?"":"disabled"}>
        ${allDone?"🚦 ออกจากลูกค้าได้ → "+(i+1<curDrv.drops.length?"จุดที่ "+(i+2):"กลับ HSL"):"🔒 ติ๊กทุกข้อก่อนออก ("+[pc.sample,pc.doc,pc.claim].filter(v=>v!==null).length+"/3 ข้อ)"}
      </button>`;
    }

    const svcBadge = isDone ? `<span class="svc-time-badge">⏱ Service ${ds.serviceMin} นาที</span>` : "";
    h += `<div class="phase-card" style="border:2px solid ${isActive?"var(--teal)":isDone?"var(--teal)":"var(--bdr)"};">
      <div class="drop-header">
        <div class="drop-badges">
          <span class="drop-num-badge">จุดที่ ${i+1}</span>
          <span class="round-badge rb-${drop.round}">รอบ ${drop.round}</span>
          ${svcBadge}
        </div>
        <div class="drop-nick">${drop.nick}</div>
        <div style="font-size:10px;color:var(--txt3);margin-top:1px;">${drop.company}</div>
      </div>
      <div style="padding:${body?"10px 14px":"0"}">${body}</div>
    </div>`;
  });

  // Return
  const rDone = ph==="done";
  h += card("var(--pur)", ph==="return", rDone, "Step 8", "กลับ HSL — รปภ. Scan เข้า",
    ph==="return" ? `
    <div style="background:var(--pur2);border-radius:10px;padding:12px;margin-bottom:10px;text-align:center;">
      <div style="font-size:12px;color:var(--pur);">รปภ. Scan บัตรกลับ HSL · ระบบ Export ค่าเที่ยว Auto</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <span style="font-size:12px;color:var(--txt3);">เวลากลับถึง HSL:</span>
      <input type="time" id="returnInp" value="${tripState.returnTime}" oninput="tripState.returnTime=this.value" class="tt-time-inp" style="flex:1;">
    </div>
    <button class="confirm-btn" style="background:var(--pur);" onclick="confirmReturn()">🏠 กลับถึง HSL — ปิดเที่ยว</button>` : "");

  // Done
  if (ph==="done") {
    const s = calcSummary();
    const fLabel = tripState.fillRate===999?"Over Truck":tripState.fillRate===90?"85-90%":tripState.fillRate+"%";
    h += `<div class="phase-card" style="border:2px solid var(--gold);">
      <div class="pc-header"><div class="pc-title" style="color:var(--gold);">🏁 เที่ยวเสร็จสมบูรณ์</div></div>
      <div class="sc-r" style="padding:8px 0;">
        <div class="sc-r-item"><span class="sc-r-key">📦 Fill Rate</span><span class="sc-r-val">${fLabel}</span></div>
        <div class="sc-r-item"><span class="sc-r-key">🚦 Dispatch</span><span class="sc-r-val">${tripState.dispatchTime}</span></div>
        <div class="sc-r-item"><span class="sc-r-key">🏠 กลับถึง HSL</span><span class="sc-r-val">${tripState.returnTime}</span></div>
        <div class="sc-r-item"><span class="sc-r-key">⏱ เวลารวม</span><span class="sc-r-val">${Math.floor(s.totalTrip/60)}ชม.${s.totalTrip%60}น.</span></div>
        ${curDrv.drops.map((d,i)=>`<div class="sc-r-item"><span class="sc-r-key">📍 จุด${i+1} ${d.nick}</span><span class="sc-r-val">${tripState.drops[i].serviceMin}นาที</span></div>`).join("")}
      </div>
    </div>`;
  }

  document.getElementById("tripFlow").innerHTML = h;
  updateStepper();
}

// ── Card helper ──────────────────────────────────────────────────
function card(color, active, done, stepTag, title, body) {
  const border = active ? color : done ? "var(--teal)" : "var(--bdr)";
  const badge = done ? `<span class="pc-badge pb-done">✅ เสร็จแล้ว</span>`
              : active ? `<span class="pc-badge pb-active">⏳ กำลัง</span>`
              : `<span class="pc-badge pb-pending">🔒 รอ</span>`;
  return `<div class="phase-card" style="border:2px solid ${border};">
    <div class="pc-header">
      <div><div class="pc-step-tag">${stepTag}</div><div class="pc-title" style="color:${active?color:"var(--txt2)"};">${title}</div></div>
      ${badge}
    </div>
    ${body ? `<div style="padding:4px 0 8px;">${body}</div>` : ""}
  </div>`;
}


// ── GMP CHECKLIST (Trial Mode) ────────────────────────────────
const gmpState = new Array(8).fill(false);

function toggleGMPBox(i, row) {
  gmpState[i] = !gmpState[i];
  const box = document.getElementById("gmpBox"+i);
  if (box) {
    box.style.background  = gmpState[i] ? "var(--grn)"  : "var(--wht)";
    box.style.borderColor = gmpState[i] ? "var(--grn)"  : "var(--bdr)";
    box.textContent       = gmpState[i] ? "✓" : "";
    box.style.color       = "#fff";
  }
  const done = gmpState.filter(Boolean).length;
  const countEl = document.getElementById("gmpCount");
  const btn     = document.getElementById("gmpBtn");
  if (countEl) countEl.textContent = done+"/8";
  if (btn) {
    btn.disabled    = done < 8;
    btn.textContent = done < 8
      ? "🔒 ติ๊กครบทุกข้อก่อน ("+done+"/8)"
      : "✅ Daily Check เสร็จแล้ว → เริ่มโหลดสินค้า";
  }
}

// ── Phase logic ──────────────────────────────────────────────────
function confirmGMP() {
  tripState.loadStartTime = nowHHMM();
  tripState.phase = "loading";
  renderFlow(); toast("✅ Daily Check ผ่าน · เริ่มโหลด " + tripState.loadStartTime);
}
function confirmLoad() {
  if (!tripState.loadEndTime) tripState.loadEndTime = nowHHMM();
  if (!tripState.fillRate) { toast("⚠️ เลือก Fill Rate ก่อนครับ"); return; }
  tripState.phase = "bill"; renderFlow();
  toast("📦 โหลดเสร็จ " + tripState.loadEndTime + " · Fill Rate " + (tripState.fillRate===999?"Over":tripState.fillRate===90?"85-90%":tripState.fillRate+"%"));
}
function adjBill(d) { tripState.waitBill = Math.max(0,Math.min(60,tripState.waitBill+d)); renderFlow(); }
function confirmBill() { tripState.phase = "dispatched"; renderFlow(); toast("🧾 รับ Bill รอ "+tripState.waitBill+" นาที"); }
async function confirmEmailSend(i, type, val, label, customerName) {
  // บันทึกค่าเวลาก่อน
  if (type === "arrive")  tripState.drops[i].arriveTime      = val;
  if (type === "unload")  tripState.drops[i].unloadStartTime = val;
  if (type === "done")    tripState.drops[i].doneTime        = val;

  // แสดง Popup ยืนยัน
  const confirmed = await showConfirmModal(
    `ยืนยันการส่ง Email`,
    `${label}\n🏢 ${customerName}\n⏰ เวลา ${val} น.\n\nส่ง Email แจ้งฝ่ายขายเลยไหมครับ?`
  );
  if (!confirmed) return;

  // ส่ง Email
  const basePayload = {
    trip_id:     "HSL-"+DATE_CODE+"-"+curDrv.plate.replace(/\s/g,"")+"-D"+(i+1),
    drop_index:  i+1,
    total_drops: curDrv.drops.length,
    plate:       curDrv.plate,
    driver:      curDrv.name,
    customer:    curDrv.drops[i].nick,
    zone:        curDrv.drops[i].zone,
    time:        val,
    event_type:  label,
    note:        tripState.drops[i].note || "-"
  };

  if (type === "arrive")  await sendEmail("emailArrive",  {...basePayload, arrive_time: val});
  if (type === "unload")  await sendEmail("emailUnload",  {...basePayload, unload_time: val});
  if (type === "done")    await sendEmail("emailDone",    {
    ...basePayload,
    arrive_time:  tripState.drops[i].arriveTime,
    done_time:    val,
    service_min:  Math.max(0, toMin(val) - toMin(tripState.drops[i].arriveTime || val)),
    q1_ontime:    tripState.drops[i].chk?.c1 ? "✅ ตรงเวลา"  : "❌ ไม่ตรงเวลา",
    q2_complete:  tripState.drops[i].chk?.c2 ? "✅ ครบถ้วน"  : "❌ ไม่ครบ",
    q3_document:  tripState.drops[i].chk?.c3 ? "✅ ครบ"       : "❌ ไม่ครบ",
    q4_satisfy:   (tripState.drops[i].sat || 0) + "/5",
    wait_bill_min: tripState.waitBill
  });

  toast("📧 ส่ง Email " + label + " เรียบร้อยแล้วครับ");
}

function showConfirmModal(title, message) {
  return new Promise(resolve => {
    // สร้าง Modal
    const overlay = document.createElement("div");
    overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;`;
    overlay.innerHTML = `
      <div style="background:var(--navy2);border-radius:16px;padding:24px;max-width:320px;width:100%;border:1px solid var(--gold);box-shadow:0 8px 32px rgba(0,0,0,0.4);">
        <div style="font-size:16px;font-weight:700;color:var(--gold);margin-bottom:12px;">📧 ${title}</div>
        <div style="font-size:13px;color:var(--txt2);line-height:1.7;white-space:pre-line;margin-bottom:20px;">${message}</div>
        <div style="display:flex;gap:10px;">
          <button id="modalCancel" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt2);font-size:14px;cursor:pointer;">❌ ยกเลิก</button>
          <button id="modalConfirm" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--gold);color:#000;font-size:14px;font-weight:700;cursor:pointer;">✅ ส่ง Email</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById("modalConfirm").onclick = () => { document.body.removeChild(overlay); resolve(true); };
    document.getElementById("modalCancel").onclick  = () => { document.body.removeChild(overlay); resolve(false); };
  });
}


  try {
    await fetch(API, {
      method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({action, data: payload})
    });
  } catch(e) {}
}

async function confirmDispatch() {
  tripState.dispatchTime = nowHHMM();
  tripState.phase = curDrv.drops.length > 0 ? "drop_0" : "return";
  renderFlow(); toast("🚦 Dispatch " + tripState.dispatchTime);
  await sendEmail("emailDispatch", {
    trip_id:      "HSL-"+DATE_CODE+"-"+curDrv.plate.replace(/\s/g,""),
    driver:       curDrv.name,
    plate:        curDrv.plate,
    dispatch_time: tripState.dispatchTime,
    fill_rate:    tripState.fillRate || "-",
    total_drops:  curDrv.drops.length,
    destinations: curDrv.drops.map((d,i)=>`จุดที่${i+1}: ${d.nick} (${d.zone})`).join(", ")
  });
}
async function confirmDrop(i) {
  const ds = tripState.drops[i];
  ds.arriveTime = document.getElementById("arrive"+i)?.value || "";
  ds.unloadStartTime = document.getElementById("unload"+i)?.value || "";
  ds.doneTime = document.getElementById("done"+i)?.value || "";
  ds.note = document.getElementById("note"+i)?.value || "";
  if (!ds.arriveTime) { toast("⚠️ กรอกเวลาถึงลูกค้า"); return; }
  if (!ds.doneTime)   { toast("⚠️ กรอกเวลาลงสินค้าเสร็จ"); return; }
  if (ds.sat === 0)   { toast("⚠️ เลือกระดับความพึงพอใจ"); return; }
  ds.serviceMin = Math.max(0, toMin(ds.doneTime) - toMin(ds.arriveTime));
  ds.saved = true;

  const basePayload = {
    trip_id:     "HSL-"+DATE_CODE+"-"+curDrv.plate.replace(/\s/g,"")+"-D"+(i+1),
    drop_index:  i+1,
    total_drops: curDrv.drops.length,
    plate:       curDrv.plate,
    driver:      curDrv.name,
    customer:    curDrv.drops[i].nick,
    zone:        curDrv.drops[i].zone,
    arrive_time: ds.arriveTime,
    done_time:   ds.doneTime,
    service_min: ds.serviceMin,
    note:        ds.note || "-"
  };

  // EMAIL 2: ถึงลูกค้า
  await sendEmail("emailArrive", basePayload);
  // EMAIL 3: ส่งของเสร็จ + ผล IFOT
  await sendEmail("emailDone", {
    ...basePayload,
    q1_ontime:   ds.chk.c1 ? "✅ ตรงเวลา"  : "❌ ไม่ตรงเวลา",
    q2_complete: ds.chk.c2 ? "✅ ครบถ้วน"  : "❌ ไม่ครบ",
    q3_document: ds.chk.c3 ? "✅ ครบ"       : "❌ ไม่ครบ",
    q4_satisfy:  ds.sat + "/5",
    wait_bill_min: tripState.waitBill
  });

  // บันทึก Eval ลง Sheet ด้วย
  await sendEmail("submitEval", {
    trip_id:"HSL-"+DATE_CODE+"-"+curDrv.plate.replace(/\s/g,"")+"-D"+(i+1),
    drop_index:i+1, plate:curDrv.plate, driver_nick:curDrv.nick,
    nickname:curDrv.drops[i].nick, zone:curDrv.drops[i].zone,
    q1_ontime:ds.chk.c1?5:1, q2_complete:ds.chk.c2?5:1, q3_document:ds.chk.c3?5:1,
    q4_satisfy:ds.sat, arrival_time:ds.arriveTime, done_time:ds.doneTime,
    service_min:ds.serviceMin, wait_bill_min:tripState.waitBill, note:ds.note
  });

  renderFlow(); toast("✅ บันทึกจุดที่ "+(i+1)+" · Service "+ds.serviceMin+" นาที → ตรวจสอบก่อนออก");
}

function setPostChk(i, key, val) {
  tripState.drops[i].postChk[key] = val;
  renderFlow();
}

function confirmPostChk(i) {
  const pc = tripState.drops[i].postChk;
  if (pc.sample===null||pc.doc===null||pc.claim===null) { toast("⚠️ กรุณาเลือก มี/ไม่มี ทุกข้อก่อนออกครับ"); return; }
  tripState.drops[i].postChkDone = true;
  tripState.phase = i+1 < curDrv.drops.length ? "drop_"+(i+1) : "return";
  renderFlow(); toast("✅ Checklist ผ่าน → "+(i+1<curDrv.drops.length?"จุดที่ "+(i+2):"กลับ HSL"));
}
function confirmReturn() {
  if (!tripState.returnTime) tripState.returnTime = nowHHMM();
  tripState.phase = "done"; renderFlow(); toast("🏠 กลับถึง HSL " + tripState.returnTime);
}
function calcSummary() {
  const dispM = toMin(tripState.dispatchTime), retM = toMin(tripState.returnTime);
  const totalTrip = retM > dispM ? retM - dispM : 0;
  const totalService = tripState.drops.reduce((s,d) => s+(d.serviceMin||0), 0);
  return {totalTrip, totalService, totalTravel: Math.max(0, totalTrip-totalService-tripState.waitBill)};
}
function buildTruckInfo(drv) {
  document.getElementById("truckInfoBody").innerHTML =
    [["🚛","ทะเบียน",drv.plate],["👤","คนขับ",drv.name],["📞","เบอร์โทร",drv.phone],
     ["🚛","ประเภท",drv.type],["📍","Terminal",drv.term],["🛣️","ไมล์",drv.km+" กม."]]
    .map(([ico,lbl,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px;"><span style="color:var(--txt3);">${ico} ${lbl}</span><span style="font-weight:500;">${v}</span></div>`)
    .join("");
}

  document.getElementById("checkLinkArea").innerHTML = `

      <div><div style="font-size:14px;font-weight:600;color:var(--grn);">Daily Check 35 รายการ</div>
      <div style="font-size:11px;color:var(--teal);margin-top:2px;">⏰ กรอกก่อน 07:30 น. · ${drv.plate}</div></div>
      <div style="margin-left:auto;font-size:18px;color:var(--grn);">›</div>
    </a>`;
}
function switchTab(name) {
  ["trip","truck","check"].forEach(t => { document.getElementById("tab-"+t).style.display = t===name?"block":"none"; });
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  const idx = ["trip","truck","check"].indexOf(name);
  document.querySelectorAll(".tab")[idx]?.classList.add("active");
}
let _tt;
function toast(msg){clearTimeout(_tt);const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");_tt=setTimeout(()=>t.classList.remove("show"),3500);}
(()=>{
  // Populate dropdown from DRIVERS array
  const sel = document.getElementById("driverSel");
  if (sel) {
    DRIVERS.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.id;

      sel.appendChild(opt);

  // URL param auto-load
  const p = new URLSearchParams(window.location.search);
  const id = p.get("driver");

})();
