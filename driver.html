<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B1F33">
<title>HSL ใบงานจัดส่ง</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0B1F33;--navy2:#152C44;--gold:#C8962A;--gold2:#E8B84B;
  --teal:#0F6E56;--teal2:#E1F5EE;--red:#A32D2D;--red2:#FCEBEB;
  --amb:#854F0B;--amb2:#FAEEDA;--blu:#0C447C;--blu2:#E6F1FB;
  --grn:#27500A;--grn2:#EAF3DE;--pur:#3C3489;--pur2:#EEEDFE;
  --surf:#F0F2F5;--wht:#fff;--bdr:#E2E6EC;
  --txt:#0B1525;--txt2:#3A4E63;--txt3:#6B7E92;
}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--surf);color:var(--txt);min-height:100vh;padding-bottom:32px;}
.hdr{background:var(--navy);padding:16px 16px 0;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{font-size:13px;font-weight:700;color:var(--gold2);}
.logo span{display:block;font-size:10px;color:rgba(255,255,255,.35);font-weight:400;}
.date-pill{font-size:11px;padding:4px 10px;border-radius:99px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}
.sel-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:11px 14px;margin-bottom:14px;}
.sel-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.sel-row{display:flex;align-items:center;gap:8px;}
.sel-row select{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 10px;font-size:13px;color:#fff;font-family:inherit;outline:none;}
.sel-row select option{background:var(--navy2);color:#fff;}
.sel-row button{padding:8px 14px;background:var(--gold);border:none;border-radius:8px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;}
.sel-row button:active{transform:scale(.97);}
.drv-card{background:linear-gradient(135deg,var(--navy2),#1D3A5C);border:1px solid rgba(200,150,42,.25);border-radius:14px;padding:13px 15px;margin-bottom:0;}
.dc-lbl{font-size:10px;font-weight:600;color:var(--gold2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.dc-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dc-plate{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#fff;}
.dc-name{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;}
.dc-stats{display:flex;gap:14px;align-items:center;}
.dcs{text-align:center;}
.dcs-n{font-size:19px;font-weight:700;color:#fff;font-family:'IBM Plex Mono',monospace;line-height:1;}
.dcs-l{font-size:9px;color:rgba(255,255,255,.4);margin-top:3px;}
.exit-box{background:var(--gold);border-radius:9px;padding:6px 12px;text-align:center;}
.exit-t{font-size:17px;font-weight:700;color:#fff;font-family:'IBM Plex Mono',monospace;line-height:1;}
.exit-l{font-size:9px;color:rgba(255,255,255,.75);margin-top:2px;}
.tabs{background:var(--navy);display:flex;padding:0 16px;border-top:1px solid rgba(255,255,255,.06);}
.tab{flex:1;padding:10px 0;font-size:12px;font-weight:500;color:rgba(255,255,255,.4);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold);}
.content{padding:14px 12px;}
.drop-card{background:var(--wht);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:12px;}
.dc-stripe{height:4px;}
.dc-head{padding:12px 14px 10px;border-bottom:1px solid var(--bdr);}
.dc-badges{display:flex;gap:6px;margin-bottom:5px;}
.drop-num{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--navy);color:var(--gold2);}
.round-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;}
.rt-1{background:var(--grn2);color:var(--grn);}
.rt-2{background:var(--pur2);color:var(--pur);}
.dc-nick{font-size:22px;font-weight:700;color:var(--navy);line-height:1.1;margin-top:4px;}
.dc-company{font-size:11px;color:var(--txt3);margin-top:2px;}
.tid-row{background:var(--surf);padding:6px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.tid-l{font-size:10px;color:var(--txt3);}
.tid-v{font-size:11px;font-weight:600;color:var(--navy);font-family:'IBM Plex Mono',monospace;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--bdr);}
.ig-cell{padding:9px 14px;border-right:1px solid var(--bdr);}
.ig-cell:nth-child(even){border-right:none;}
.ig-l{font-size:10px;color:var(--txt3);}
.ig-v{font-size:13px;font-weight:600;color:var(--txt);margin-top:2px;}
.po-row{padding:9px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.po-lbl{font-size:10px;color:var(--txt3);min-width:20px;}
.po-chip{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;background:var(--amb2);color:var(--amb);}
.cond-row{padding:9px 14px;border-bottom:1px solid var(--bdr);background:#FFFBF5;}
.cond-l{font-size:10px;font-weight:600;color:var(--amb);margin-bottom:3px;}
.cond-t{font-size:12px;color:var(--txt2);line-height:1.55;}
.actions{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.act-btn{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;border:1px solid var(--bdr);background:var(--wht);text-decoration:none;cursor:pointer;transition:all .12s;color:inherit;}
.act-btn:active{transform:scale(.98);background:var(--surf);}
.ab-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ai-green{background:var(--teal2);}
.ai-purple{background:var(--pur2);}
.ai-blue{background:var(--blu2);}
.ab-body{flex:1;min-width:0;}
.ab-title{font-size:13px;font-weight:600;color:var(--navy);}
.ab-sub{font-size:11px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ab-qr{flex-shrink:0;width:44px;height:44px;border-radius:7px;overflow:hidden;border:1px solid var(--bdr);background:var(--wht);}
.ab-qr canvas,.ab-qr img{width:44px!important;height:44px!important;}
.ab-arr{font-size:16px;color:var(--txt3);margin-left:2px;}
.sign-row{margin:0 12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sign-box{background:var(--wht);border:1px solid var(--bdr);border-radius:12px;padding:12px 14px;min-height:64px;}
.sign-l{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.sign-line{border-bottom:1px dashed var(--bdr);margin-top:22px;}
.empty{text-align:center;padding:40px 20px;color:var(--txt3);}
.empty-icon{font-size:36px;margin-bottom:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:12px;font-size:12px;font-weight:500;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;border-left:3px solid var(--gold);pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.info-card{background:var(--wht);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:12px;padding:14px;}
.info-row-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px;}
.info-row-item:last-child{border-bottom:none;}
.doc-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:500;}
.db-ok{background:var(--grn2);color:var(--grn);}
.copy-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--txt3);padding:2px 5px;border-radius:4px;font-family:inherit;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">HSL Cartons<span>ใบงานจัดส่ง</span></div>
    <div class="date-pill" id="dateLabel">—</div>
  </div>

  <div class="sel-box">
    <div class="sel-label">เลือกคนขับ / ทะเบียนรถ</div>
    <div class="sel-row">
      <select id="driverSel" onchange="onSelChange()">
        <option value="">-- เลือกคนขับ --</option>
      </select>
      <button onclick="loadDriver()">โหลด ▶</button>
    </div>
  </div>

  <div id="driverCard" style="display:none;">
    <div class="drv-card">
      <div class="dc-lbl">📋 ใบงานวันนี้</div>
      <div class="dc-row">
        <div>
          <div class="dc-plate" id="dcPlate">—</div>
          <div class="dc-name" id="dcName">—</div>
        </div>
        <div class="dc-stats">
          <div class="dcs"><div class="dcs-n" id="dcDrops">0</div><div class="dcs-l">จุดส่ง</div></div>
          <div class="dcs"><div class="dcs-n" id="dcQty">0</div><div class="dcs-l">ชิ้น</div></div>
          <div class="exit-box"><div class="exit-t">08:00</div><div class="exit-l">ออก</div></div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('drops',this)">📦 จุดส่ง</div>
      <div class="tab" onclick="switchTab('truck',this)">🚛 ข้อมูลรถ</div>
      <div class="tab" onclick="switchTab('check',this)">✅ Daily Check</div>
    </div>
  </div>
</div>

<div class="content">
  <div id="tab-drops">
    <div id="dropCards">
      <div class="empty"><div class="empty-icon">📋</div><div>เลือกคนขับแล้วกด "โหลด"</div></div>
    </div>
  </div>
  <div id="tab-truck" style="display:none;">
    <div class="info-card" id="truckInfoCard" style="padding:0;overflow:hidden;">
      <div style="padding:12px 14px;background:var(--navy2);">
        <div style="font-size:12px;font-weight:600;color:var(--gold2);">🚛 ข้อมูลรถและเอกสาร</div>
      </div>
      <div style="padding:14px;" id="truckInfoBody"></div>
    </div>
  </div>
  <div id="tab-check" style="display:none;">
    <div class="info-card">
      <div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:12px;">✅ Daily Check — กดลิงก์ด้านล่าง</div>
      <div id="checkLinkArea"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

   ]},
  {id:"DRV003",plate:"7M83-3620",nick:"ทวีศักดิ์",name:"ทวีศักดิ์ มณีชล",type:"6ล้อ 7ม.",term:"T4",phone:"091-059-4842",km:"382,491",

  {id:"DRV004",plate:"7M83-1067",nick:"พงษ์พิพัฒน์",name:"พงษ์พิพัฒน์ พราหมณ์สุวรรณ์",type:"6ล้อ 7ม.",term:"T5",phone:"064-246-2541",km:"635,724",

   ]},

   drops:[{nick:"โตโยต้าสำโรง",company:"บริษัท โตโยต้า ไดฮัทสุ เอ็นจิเนียริ่ง จำกัด",zone:"สำโรง สมุทรปราการ",pos:["1S-HSL1ASQA5155","1S-HSL1ASPA5202"],qty:332,round:1,cond:"ส่งประตูหลัก · แจ้ง Security ชื่อบริษัท HSL · รับใบ Delivery Note",maps:"https://maps.google.com/?q=Toyota+Daihatsu+Samrong+Samutprakarn"}]},

   drops:[{nick:"แปซิฟิค",company:"บริษัท แปซิฟิค อินดัสตรีย์ส (ไทยแลนด์) จำกัด",zone:"เวลโกร์ว สมุทรปราการ",pos:["C260600143"],qty:600,round:1,cond:"ส่งสินค้าที่คลังสินค้า โซน A · เก็บใบรับสินค้าคืน",maps:"https://maps.google.com/?q=Pacific+Industries+Thailand+Wellgrow"}]},
];

let curDrv = null;

window.addEventListener("load",()=>{
  const d = new Date();
  document.getElementById("dateLabel").textContent = "📅 "+d.getDate()+" มิ.ย. "+(d.getFullYear()+543);
  const sel = document.getElementById("driverSel");
  DRIVERS.forEach(drv=>{
    const o = document.createElement("option");
    o.value = drv.id;
    o.textContent = drv.plate+" — "+drv.nick;
    sel.appendChild(o);
  });
  const p = new URLSearchParams(location.search);
  const q = p.get("driver")||p.get("plate");
  if(q){
    const f = DRIVERS.find(d=>d.id===q||d.plate===q||d.nick===q);
    if(f){ sel.value=f.id; loadDriver(); }
  }
});

function onSelChange(){
  const v = document.getElementById("driverSel").value;
  curDrv = v ? DRIVERS.find(d=>d.id===v) : null;
}

function loadDriver(){
  const v = document.getElementById("driverSel").value;
  if(!v){ toast("⚠️ กรุณาเลือกคนขับก่อน"); return; }
  curDrv = DRIVERS.find(d=>d.id===v);
  if(!curDrv) return;

  document.getElementById("driverCard").style.display="block";
  document.getElementById("dcPlate").textContent = curDrv.plate;
  document.getElementById("dcName").textContent  = curDrv.name+" · "+curDrv.type+" · "+curDrv.term+" · 📞 "+curDrv.phone;
  document.getElementById("dcDrops").textContent = curDrv.drops.length;
  const totalQty = curDrv.drops.reduce((s,d)=>s+d.qty,0);
  document.getElementById("dcQty").textContent   = totalQty.toLocaleString();

  renderDrops(curDrv);
  buildTruckInfo(curDrv);
  buildCheckTab(curDrv);
  switchTab("drops",document.querySelector(".tab.active"));
  setTimeout(()=>genAllQR(curDrv),400);
  toast("✅ โหลดใบงาน "+curDrv.nick+" — "+curDrv.drops.length+" จุดส่ง");
}

const STRIPES = [
  "linear-gradient(90deg,#0F6E56,#C8962A)",
  "linear-gradient(90deg,#534AB7,#0F6E56)",
  "linear-gradient(90deg,#C8962A,#0C447C)"
];

let qrData = {};

function renderDrops(drv){
  qrData = {};
  const c = document.getElementById("dropCards");
  if(!drv.drops.length){ c.innerHTML='<div class="empty"><div class="empty-icon">📦</div><div>ไม่มีจุดส่งวันนี้</div></div>'; return; }
  c.innerHTML = drv.drops.map((drop,i)=>{
    const tid = "HSL-"+DATE_CODE+"-"+drv.plate.replace(/\s/g,"")+"-D"+(i+1);
    const evalUrl = GFORM_EVAL+"?trip="+encodeURIComponent(tid)+"&nick="+encodeURIComponent(drop.nick)+"&driver="+encodeURIComponent(drv.nick)+"&plate="+encodeURIComponent(drv.plate)+"&date="+encodeURIComponent(TODAY_STR)+"&qc="+encodeURIComponent(drv.drops[i]&&drv.drops[i].qc||"");
    const disUrl  = GFORM_DISPATCH+"?trip="+encodeURIComponent(tid)+"&plate="+encodeURIComponent(drv.plate);
    qrData[i] = { map:drop.maps, eval:evalUrl, dis:disUrl };
    return `
    <div class="drop-card">
      <div class="dc-stripe" style="background:${STRIPES[i%STRIPES.length]}"></div>
      <div class="dc-head">
        <div class="dc-badges">
          <span class="drop-num">จุดที่ ${i+1}</span>
          <span class="round-tag rt-${drop.round}">รอบ ${drop.round}</span>
        </div>
        <div class="dc-nick">${drop.nick}</div>
        <div class="dc-company">${drop.company}</div>
      </div>
      <div class="tid-row">
        <span class="tid-l">Trip ID</span>
        <div style="display:flex;align-items:center;gap:5px;">
          <span class="tid-v">${tid}</span>
          <button class="copy-btn" onclick="copyIt('${tid}')">📋</button>
        </div>
      </div>
      <div class="info-grid">
        <div class="ig-cell"><div class="ig-l">📍 โซน</div><div class="ig-v" style="font-size:12px;">${drop.zone}</div></div>
        <div class="ig-cell"><div class="ig-l">📦 จำนวน</div><div class="ig-v">${drop.qty.toLocaleString()} ชิ้น</div></div>
      </div>
      <div class="po-row"><span class="po-lbl">PO</span>${drop.pos.map(p=>'<span class="po-chip">'+p+'</span>').join("")}</div>
      <div class="cond-row"><div class="cond-l">⚠ เงื่อนไขการส่ง</div><div class="cond-t">${drop.cond}</div></div>
      <div class="actions">
        <a class="act-btn" href="${drop.maps}" target="_blank" rel="noopener">
          <div class="ab-icon ai-green">📍</div>
          <div class="ab-body"><div class="ab-title">Google Maps — นำทาง</div><div class="ab-sub">กดเพื่อเปิดแผนที่ไป ${drop.nick}</div></div>
          <div class="ab-qr" id="qrm-${i}"></div>
          <span class="ab-arr">›</span>
        </a>
        <a class="act-btn" href="${evalUrl}" target="_blank" rel="noopener">
          <div class="ab-icon ai-purple">⭐</div>
          <div class="ab-body"><div class="ab-title">ให้ลูกค้าประเมิน IFOT</div><div class="ab-sub">Scan QR หรือกดลิงก์ · pre-fill ${tid}</div></div>
          <div class="ab-qr" id="qre-${i}"></div>
          <span class="ab-arr">›</span>
        </a>
        <a class="act-btn" href="${disUrl}" target="_blank" rel="noopener">
          <div class="ab-icon ai-blue">🔐</div>
          <div class="ab-body"><div class="ab-title">Dispatch รปภ. ออกประตู</div><div class="ab-sub">รปภ. กดเมื่อรถออกโรงงาน · บันทึก Timestamp</div></div>
          <div class="ab-qr" id="qrd-${i}"></div>
          <span class="ab-arr">›</span>
        </a>
      </div>
      <div class="sign-row">
        <div class="sign-box"><div class="sign-l">คนขับเซ็นรับ</div><div class="sign-line"></div></div>
        <div class="sign-box"><div class="sign-l">ลูกค้าเซ็นรับ</div><div class="sign-line"></div></div>
      </div>
    </div>`;
  }).join("");
}

function genAllQR(drv){
  drv.drops.forEach((_,i)=>{
    const d = qrData[i];
    if(!d) return;
    mkQR("qrm-"+i, d.map);
    mkQR("qre-"+i, d.eval);
    mkQR("qrd-"+i, d.dis);
  });
}

function mkQR(id,url){
  const el = document.getElementById(id);
  if(!el) return;
  if(!url||url.includes("YOUR_")){
    el.innerHTML='<div style="width:44px;height:44px;background:var(--surf);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:16px;">🔗</div>';
    return;
  }
  try{ new QRCode(el,{text:url,width:44,height:44,colorDark:"#0B1F33",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M}); }catch(e){}
}

function buildTruckInfo(drv){
  const info = [
    ["🚛 ทะเบียนรถ", drv.plate],
    ["👤 คนขับ", drv.name],
    ["📞 เบอร์โทร", drv.phone],
    ["🚛 ประเภท", drv.type],
    ["📍 Terminal", drv.term],
    ["🛣️ เลขไมล์ปัจจุบัน", drv.km+" กม."],
    ["📋 ประกันภัย", "✅ 31/12/2569"],
    ["💰 ภาษีประจำปี", "✅ 31/03/2570"],
    ["📄 พรบ.", "✅ 31/12/2569"],
  ];
  document.getElementById("truckInfoBody").innerHTML = info.map(([l,v])=>
    `<div class="info-row-item"><span style="color:var(--txt3);">${l}</span><span style="font-weight:500;">${v}</span></div>`
  ).join("");
}

function buildCheckTab(drv){
  const url = GFORM_CHECK+"?plate="+encodeURIComponent(drv.plate)+"&driver="+encodeURIComponent(drv.nick)+"&date="+encodeURIComponent(TODAY_STR);
  document.getElementById("checkLinkArea").innerHTML = `
    <a href="${url}" target="_blank"
       style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;border:1px solid var(--grn);background:var(--grn2);text-decoration:none;margin-bottom:12px;">
      <div style="width:44px;height:44px;border-radius:11px;background:var(--grn);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">✅</div>
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--grn);">Daily Check วันนี้</div>
        <div style="font-size:11px;color:var(--teal);margin-top:2px;">ตรวจสอบสภาพรถ 35 รายการ · pre-fill ${drv.plate}</div>
      </div>
      <div style="margin-left:auto;font-size:18px;color:var(--grn);">›</div>
    </a>
    <div style="font-size:12px;color:var(--txt3);text-align:center;line-height:1.6;">
      กดลิงก์ด้านบนทุกเช้าก่อนออกรถ<br>
      ระบบจะบันทึก Timestamp อัตโนมัติ<br>
      <b style="color:var(--amb);">⏰ ต้องกรอกก่อน 07:30 น.</b>
    </div>`;
}

function switchTab(name, el){
  ["drops","truck","check"].forEach(t=>{
    document.getElementById("tab-"+t).style.display = t===name?"block":"none";
  });
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const tabs = document.querySelectorAll(".tab");
  const idx = ["drops","truck","check"].indexOf(name);
  if(tabs[idx]) tabs[idx].classList.add("active");
}

function copyIt(txt){
  navigator.clipboard.writeText(txt).catch(()=>{});
  toast("📋 Copy แล้ว: "+txt);
}

let _tt;
function toast(msg){
  clearTimeout(_tt);
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  _tt=setTimeout(()=>t.classList.remove("show"),3000);
}
</script>
</body>
</html>
